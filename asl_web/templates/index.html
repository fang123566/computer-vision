<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ASL 手语实时识别系统</title>
  <style>
    /* ── Reset & Base ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --border:   #30363d;
      --accent:   #58a6ff;
      --green:    #3fb950;
      --orange:   #d29922;
      --red:      #f85149;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --radius:   14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ───────────────────────────────────── */
    header {
      padding: 18px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
    }
    .logo { font-size: 28px; }
    .title-wrap h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: .4px; }
    .title-wrap p  { font-size: .78rem; color: var(--muted); margin-top: 2px; }

    .status-pill {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: .78rem;
      background: rgba(56,139,253,.12);
      border: 1px solid rgba(56,139,253,.3);
      border-radius: 20px;
      padding: 5px 14px;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--muted);
      transition: background .3s;
    }
    .dot.active  { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot.loading { background: var(--orange); animation: pulse .9s infinite; }

    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.4 } }

    /* ── Main layout ──────────────────────────────── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 20px;
      padding: 20px 28px;
      max-width: 1280px;
      width: 100%;
      margin: 0 auto;
    }

    /* ── Video panel ──────────────────────────────── */
    .video-panel {
      position: relative;
      background: #000;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      aspect-ratio: 4/3;
    }
    #video {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transform: scaleX(-1);   /* selfie mirror */
    }
    #overlay {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }
    .cam-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      font-size: .9rem;
    }
    .cam-placeholder .icon { font-size: 48px; }

    /* ── Right panel ──────────────────────────────── */
    .right-panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* prediction card */
    .pred-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 20px;
      text-align: center;
    }
    .pred-label { font-size: .72rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); }

    #letter-display {
      font-size: 120px;
      font-weight: 800;
      line-height: 1;
      margin: 8px 0;
      color: var(--accent);
      transition: transform .1s, color .15s;
      min-height: 130px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #letter-display.pop { transform: scale(1.18); color: #79c0ff; }
    #letter-display.none { color: var(--border); }

    /* confidence bar */
    .conf-wrap { margin-top: 8px; }
    .conf-label-row { display: flex; justify-content: space-between; font-size: .72rem; color: var(--muted); margin-bottom: 4px; }
    .conf-bar-bg { background: var(--border); border-radius: 4px; height: 6px; overflow: hidden; }
    .conf-bar-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #1f6feb, var(--accent));
      border-radius: 4px;
      transition: width .25s ease, background .3s ease;
    }
    .conf-bar-fill.high   { background: linear-gradient(90deg,#196c2e,var(--green)); }
    .conf-bar-fill.medium { background: linear-gradient(90deg,#7d4e00,var(--orange)); }
    .conf-bar-fill.low    { background: linear-gradient(90deg,#7d1a16,var(--red)); }

    /* top-3 candidates */
    .top3-wrap { margin-top: 14px; display: flex; gap: 8px; justify-content: center; }
    .top3-chip {
      flex: 1;
      background: rgba(88,166,255,.06);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 6px 4px;
      text-align: center;
      transition: background .2s;
    }
    .top3-chip.active { background: rgba(88,166,255,.18); border-color: var(--accent); }
    .top3-letter { font-size: 1.45rem; font-weight: 800; color: var(--accent); }
    .top3-prob   { font-size: .68rem; color: var(--muted); margin-top: 2px; }

    /* word builder */
    .word-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
    }
    .word-card h3 { font-size: .72rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 10px; }
    #word-display {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--text);
      min-height: 36px;
      word-break: break-all;
    }
    .word-actions { margin-top: 10px; display: flex; gap: 8px; }
    .btn {
      padding: 6px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: .78rem;
      cursor: pointer;
      transition: background .15s;
    }
    .btn:hover { background: var(--border); }
    .btn.danger { border-color: var(--red); color: var(--red); }
    .btn.danger:hover { background: rgba(248,81,73,.15); }

    /* history strip */
    .history-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
    }
    .history-card h3 { font-size: .72rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 10px; }
    #history-strip {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .hist-chip {
      width: 34px; height: 34px;
      background: rgba(56,139,253,.15);
      border: 1px solid rgba(56,139,253,.3);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: .95rem;
      color: var(--accent);
      animation: fadeIn .2s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:scale(.7) } to { opacity:1; transform:scale(1) } }

    /* controls */
    .ctrl-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .ctrl-card label { font-size: .78rem; color: var(--muted); }
    .ctrl-card input[type=range] {
      flex: 1;
      accent-color: var(--accent);
      cursor: pointer;
    }
    #fps-val { font-size: .78rem; color: var(--accent); min-width: 30px; }

    /* ── Alphabet reference ───────────────────────── */
    .alphabet-section {
      padding: 0 28px 24px;
      max-width: 1280px;
      width: 100%;
      margin: 0 auto;
    }
    .alphabet-section h2 { font-size: .82rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 12px; }
    .alpha-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .alpha-chip {
      width: 36px; height: 36px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: .9rem;
      color: var(--muted);
      transition: all .15s;
    }
    .alpha-chip.active {
      background: rgba(56,139,253,.2);
      border-color: var(--accent);
      color: var(--accent);
      transform: scale(1.12);
    }

    /* ── Responsive ───────────────────────────────── */
    @media (max-width: 820px) {
      main { grid-template-columns: 1fr; }
      .right-panel { flex-direction: row; flex-wrap: wrap; }
      .pred-card { flex: 1 1 160px; }
    }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <span class="logo">🤟</span>
  <div class="title-wrap">
    <h1>ASL 手语实时识别系统</h1>
    <p>American Sign Language Recognition · MediaPipe + SVM</p>
  </div>
  <div class="status-pill">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">等待摄像头…</span>
  </div>
</header>

<!-- Main -->
<main>

  <!-- Video -->
  <div class="video-panel">
    <div class="cam-placeholder" id="placeholder">
      <span class="icon">📷</span>
      <span>正在请求摄像头权限…</span>
    </div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
  </div>

  <!-- Right panel -->
  <div class="right-panel">

    <!-- Prediction -->
    <div class="pred-card">
      <div class="pred-label">当前识别</div>
      <div id="letter-display" class="none">–</div>
      <div class="conf-wrap">
        <div class="conf-label-row">
          <span>置信度</span>
          <span id="conf-pct">0%</span>
        </div>
        <div class="conf-bar-bg">
          <div class="conf-bar-fill" id="conf-bar"></div>
        </div>
      </div>
      <!-- Top-3 candidates -->
      <div class="top3-wrap" id="top3-wrap">
        <div class="top3-chip" id="t3-0"><div class="top3-letter">–</div><div class="top3-prob">–</div></div>
        <div class="top3-chip" id="t3-1"><div class="top3-letter">–</div><div class="top3-prob">–</div></div>
        <div class="top3-chip" id="t3-2"><div class="top3-letter">–</div><div class="top3-prob">–</div></div>
      </div>
    </div>

    <!-- Word builder -->
    <div class="word-card">
      <h3>拼写记录</h3>
      <div id="word-display">_</div>
      <div class="word-actions">
        <button class="btn" id="btn-space">空格</button>
        <button class="btn" id="btn-back">退格</button>
        <button class="btn danger" id="btn-clear">清空</button>
      </div>
    </div>

    <!-- History -->
    <div class="history-card">
      <h3>最近识别（最新在左）</h3>
      <div id="history-strip"></div>
    </div>

    <!-- FPS control -->
    <div class="ctrl-card">
      <label>检测频率</label>
      <input type="range" id="fps-slider" min="1" max="10" value="4" />
      <span id="fps-val">4 fps</span>
    </div>

  </div>
</main>

<!-- Alphabet reference -->
<section class="alphabet-section">
  <h2>字母对照</h2>
  <div class="alpha-grid" id="alpha-grid"></div>
</section>

<!-- Hidden capture canvas -->
<canvas id="capture" style="display:none"></canvas>

<script>
// ── DOM refs ──────────────────────────────────────────────────────────────────
const video       = document.getElementById("video");
const overlay     = document.getElementById("overlay");
const capture     = document.getElementById("capture");
const letterEl    = document.getElementById("letter-display");
const confBar     = document.getElementById("conf-bar");
const confPct     = document.getElementById("conf-pct");
const wordEl      = document.getElementById("word-display");
const historyEl   = document.getElementById("history-strip");
const statusDot   = document.getElementById("status-dot");
const statusText  = document.getElementById("status-text");
const placeholder = document.getElementById("placeholder");
const fpsSlider   = document.getElementById("fps-slider");
const fpsVal      = document.getElementById("fps-val");
const alphaGrid   = document.getElementById("alpha-grid");

const ctx         = overlay.getContext("2d");
const capCtx      = capture.getContext("2d");
const top3Chips   = [0,1,2].map(i => document.getElementById("t3-"+i));

// ── State ─────────────────────────────────────────────────────────────────────
let currentLetter = "";
let wordBuffer    = "";
let history       = [];
let intervalId    = null;
let fps           = 4;
let busy          = false;      // avoid piling up requests
let holdCount     = 0;          // consecutive frames with same letter
const HOLD_THRESH = 3;          // frames to hold before appending to word
const CONF_MIN    = 0.35;       // ignore predictions below this confidence
const SMOOTH_WIN  = 5;          // majority-vote window (frames)
let predBuffer    = [];         // rolling prediction buffer for smoothing

// ── Alphabet grid ─────────────────────────────────────────────────────────────
"ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(ch => {
  const d = document.createElement("div");
  d.className = "alpha-chip";
  d.id = "alpha-" + ch;
  d.textContent = ch;
  alphaGrid.appendChild(d);
});

// ── Health check on load ─────────────────────────────────────────────────────
async function checkServer() {
  try {
    const r = await fetch("/health", { signal: AbortSignal.timeout(3000) });
    const d = await r.json();
    return d.status === "ok";
  } catch (_) {
    return false;
  }
}

// ── Webcam ────────────────────────────────────────────────────────────────────
navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 }, audio: false })
  .then(async stream => {
    const serverOk = await checkServer();
    if (!serverOk) {
      setStatus("err", "服务器未启动");
      placeholder.querySelector("span:last-child").textContent =
        "⚠️ 请先在终端运行：python run.py";
      return;
    }
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      placeholder.style.display = "none";
      overlay.width  = video.videoWidth;
      overlay.height = video.videoHeight;
      capture.width  = video.videoWidth;
      capture.height = video.videoHeight;
      setStatus("active", "检测中…");
      startLoop();
    };
  })
  .catch(err => {
    setStatus("err", "无法访问摄像头");
    placeholder.querySelector("span:last-child").textContent = "⚠️ 无法访问摄像头：" + err.message;
  });

// ── FPS slider ────────────────────────────────────────────────────────────────
fpsSlider.addEventListener("input", () => {
  fps = parseInt(fpsSlider.value);
  fpsVal.textContent = fps + " fps";
  if (intervalId) { clearInterval(intervalId); startLoop(); }
});

function startLoop() {
  if (intervalId) clearInterval(intervalId);
  intervalId = setInterval(sendFrame, 1000 / fps);
}

// ── Capture & predict ─────────────────────────────────────────────────────────
async function sendFrame() {
  if (busy || video.readyState < 2) return;
  busy = true;

  capCtx.drawImage(video, 0, 0);
  const b64 = capture.toDataURL("image/jpeg", 0.75);

  try {
    const resp = await fetch("/predict", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ image: b64 }),
    });
    const data = await resp.json();
    handleResult(data);
  } catch (err) {
    setStatus("err", "服务器断开 – 请检查终端");
    console.error("[predict]", err);
  } finally {
    busy = false;
  }
}

// ── Handle result ─────────────────────────────────────────────────────────────
function handleResult(data) {
  setStatus("active", "检测中…");
  ctx.clearRect(0, 0, overlay.width, overlay.height);

  if (!data.detected) {
    updateTop3([]);
    updateLetter("–", 0, true);
    predBuffer = [];
    return;
  }

  const { prediction, confidence, top3, landmarks, connections } = data;

  // Draw landmarks on overlay
  if (landmarks && connections) drawHand(landmarks, connections);

  // Update top-3 display
  if (top3) updateTop3(top3);

  // Confidence gate: ignore low-confidence predictions
  if (confidence < CONF_MIN) {
    updateLetter("?", confidence, true);
    setStatus("loading", `置信度过低 (${Math.round(confidence*100)}%)`);
    predBuffer = [];
    return;
  }

  // Smoothing: majority vote over last SMOOTH_WIN frames
  predBuffer.push(prediction);
  if (predBuffer.length > SMOOTH_WIN) predBuffer.shift();
  const freq = {};
  predBuffer.forEach(p => freq[p] = (freq[p]||0) + 1);
  const stable = Object.entries(freq).sort((a,b)=>b[1]-a[1])[0][0];

  updateLetter(stable, confidence, false);

  // Highlight alphabet grid
  if (currentLetter !== stable) {
    if (currentLetter) unhighlight(currentLetter);
    highlight(stable);
  }

  // Word builder logic
  if (stable === currentLetter) {
    holdCount++;
    if (holdCount === HOLD_THRESH) appendToWord(stable);
  } else {
    holdCount = 0;
  }
  currentLetter = stable;
}

function updateTop3(top3) {
  top3Chips.forEach((chip, i) => {
    if (i < top3.length) {
      chip.querySelector(".top3-letter").textContent = top3[i].letter;
      chip.querySelector(".top3-prob").textContent   = Math.round(top3[i].prob*100) + "%";
      chip.classList.toggle("active", i === 0);
    } else {
      chip.querySelector(".top3-letter").textContent = "–";
      chip.querySelector(".top3-prob").textContent   = "–";
      chip.classList.remove("active");
    }
  });
}

// ── Drawing helpers ───────────────────────────────────────────────────────────
function drawHand(lms, conns) {
  const W = overlay.width, H = overlay.height;

  // Connections
  ctx.strokeStyle = "rgba(88,166,255,0.7)";
  ctx.lineWidth   = 2;
  conns.forEach(([a, b]) => {
    if (!lms[a] || !lms[b]) return;
    ctx.beginPath();
    // landmarks.x is from flipped image; mirror back for selfie display
    ctx.moveTo((1 - lms[a].x) * W, lms[a].y * H);
    ctx.lineTo((1 - lms[b].x) * W, lms[b].y * H);
    ctx.stroke();
  });

  // Joints
  lms.forEach((lm, i) => {
    const x = (1 - lm.x) * W, y = lm.y * H;
    ctx.beginPath();
    ctx.arc(x, y, i === 0 ? 6 : 4, 0, Math.PI * 2);
    ctx.fillStyle   = i === 0 ? "#ff7b54" : "#58a6ff";
    ctx.strokeStyle = "#0d1117";
    ctx.lineWidth   = 1.5;
    ctx.fill();
    ctx.stroke();
  });
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function updateLetter(ch, conf, none) {
  letterEl.textContent = ch;
  letterEl.classList.toggle("none", none);

  const pct = Math.round(conf * 100);
  confBar.style.width = pct + "%";
  confPct.textContent = pct + "%";

  // Confidence bar colour
  confBar.className = "conf-bar-fill" + (conf>=.7 ? " high" : conf>=.4 ? " medium" : " low");

  if (!none) {
    letterEl.classList.add("pop");
    setTimeout(() => letterEl.classList.remove("pop"), 150);
  }
}

function appendToWord(ch) {
  wordBuffer += ch;
  wordEl.textContent = wordBuffer || "_";
  addHistory(ch);
}

function addHistory(ch) {
  history.unshift(ch);
  if (history.length > 20) history.pop();
  historyEl.innerHTML = "";
  history.forEach(c => {
    const d = document.createElement("div");
    d.className = "hist-chip";
    d.textContent = c;
    historyEl.appendChild(d);
  });
}

function highlight(ch) {
  const el = document.getElementById("alpha-" + ch);
  if (el) el.classList.add("active");
}
function unhighlight(ch) {
  const el = document.getElementById("alpha-" + ch);
  if (el) el.classList.remove("active");
}

function setStatus(state, msg) {
  statusText.textContent = msg;
  statusDot.className = "dot" + (state === "active" ? " active" : state === "loading" ? " loading" : "");
}

// ── Word builder buttons ──────────────────────────────────────────────────────
document.getElementById("btn-space").addEventListener("click", () => {
  wordBuffer += " ";
  wordEl.textContent = wordBuffer;
});
document.getElementById("btn-back").addEventListener("click", () => {
  wordBuffer = wordBuffer.slice(0, -1);
  wordEl.textContent = wordBuffer || "_";
});
document.getElementById("btn-clear").addEventListener("click", () => {
  wordBuffer = "";
  history    = [];
  historyEl.innerHTML  = "";
  wordEl.textContent   = "_";
  updateLetter("–", 0, true);
  if (currentLetter) { unhighlight(currentLetter); currentLetter = ""; }
});
</script>

</body>
</html>
